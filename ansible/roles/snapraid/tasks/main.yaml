---
- name: Check supported distribution
  ansible.builtin.fail:
    msg:
      - "Unsupported distribution: {{ ansible_facts['distribution'] | lower }}"
      - "Supported role distributions are {{ snapraid__supported_distributions }}"
  when: ansible_facts['distribution'] | lower not in snapraid__supported_distributions

- name: Install Snapraid
  ansible.builtin.include_tasks: "install_{{ ansible_facts['distribution'] | lower }}.yaml"

- name: Create host snapraid content directory for 'snapraid.content'
  ansible.builtin.file:
    path: "{{ snapraid__content_dir }}"
    state: directory
    mode: "0755"

- name: Copy snapraid.conf
  ansible.builtin.template:
    src: snapraid.conf.j2
    dest: "{{ snapraid__conf_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Setup Snapraid daemon
  ansible.builtin.include_tasks: daemon.yaml
  when: ansible_facts['distribution'] | lower == 'archlinux'

- name: Gather service facts
  ansible.builtin.service_facts:
  when: ansible_facts['distribution'] | lower == 'archlinux'
  tags:
    - snapraid_runner_cleanup

- name: Stop snapraid-runner systemd units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - snapraid-runner.timer
    - snapraid-runner.service
  when:
    - ansible_facts['distribution'] | lower == 'archlinux'
    - item in ansible_facts.services
  tags:
    - snapraid_runner_cleanup

- name: Remove snapraid-runner files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/snapraid-runner.timer
    - /etc/systemd/system/snapraid-runner.service
    - /usr/local/bin/snapraid-runner
    - /usr/local/bin/snapraid-runner-handler
    - /usr/local/bin/snapraid-runner-notify
    - /usr/local/etc/snapraid-runner.conf
    - /usr/local/src/snapraid-runner
    - /var/log/snapraid-runner.log
  when: ansible_facts['distribution'] | lower == 'archlinux'
  tags:
    - snapraid_runner_cleanup

- name: Reload systemd after snapraid-runner cleanup
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_facts['distribution'] | lower == 'archlinux'
  tags:
    - snapraid_runner_cleanup
