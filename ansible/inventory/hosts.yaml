    harambe:
      ansible_host: 10.1.2.4
      cockpit: true
      docker: true
      packages: >-
        {{ pkgs.base | join(' ') }}
        cockpit-storaged
        cockpit-docker
      aur_packages: >-
        {{ pkgs.base_aur }}
      snapraid: true
      snapraid__daemon_maintenance_schedule: "03:00"
      snapraid__daemon_scrub_percentage: 6
      snapraid__daemon_scrub_older_than: 15
      snapraid__daemon_sync_threshold_deletes: 0
      snapraid__daemon_sync_threshold_updates: 0
      snapraid__daemon_net_enabled: 1
      snapraid__daemon_net_port: 10.1.2.4:7627
      snapraid__daemon_net_acl: +10.1.0.5
      snapraid__daemon_net_security_headers: 1
      mergerfs__mounts:
        "/dev/disk/by-id/ata-ST10000NE0008-2JM101_ZPW0MSQL-part1": /mnt/parity2
        "/dev/disk/by-id/ata-WDC_WD101EFBX-68B0AN0_VHG5TJRM-part1": /mnt/parity3
