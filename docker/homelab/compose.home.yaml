---
x-options: &options
  profiles: &profiles [home]
  environment: &environment
    TZ: "${TIMEZONE}"
  restart: unless-stopped

services:
  homeassistant:
    <<: *options
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    privileged: true
    # cap_add:
    #   - CAP_NET_RAW
    #   - CAP_NET_BIND_SERVICE
    #   - CAP_NET_ADMIN
    #   - CAP_SYS_ADMIN
    environment:
      <<: *environment
      PUID: "${PUID}"
      PGID: "${PGID}"
    volumes:
      - "${CONFIG_DIR}/homeassistant:/config"
      - /var/run/dbus:/var/run/dbus
    # https://github.com/walthowd/husbzb-firmware
    devices:
      - /dev/serial/by-id/${DEVICE_ID_ZWAVE}:/dev/ttyUSB0
      - /dev/serial/by-id/${DEVICE_ID_ZIGBEE}:/dev/ttyUSB1
    healthcheck:
      test:
        [CMD-SHELL, "curl -fsS http://localhost:8123/manifest.json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      traefik.enable: "true"
      traefik.http.routers.homeassistant.rule: Host(`home.${PUBLIC_DOMAIN}`)
      traefik.http.services.homeassistant.loadbalancer.server.port: 8123
      traefik.http.routers.homeassistant.entrypoints: websecure

  esphome:
    <<: *options
    image: esphome/esphome:latest
    container_name: esphome
    environment:
      <<: *environment
      ESPHOME_DASHBOARD_USE_PING: "true"
    volumes:
      - "${CONFIG_DIR}/esphome:/config"
    network_mode: host
    # ports:
    #   - 6052:6052
    labels:
      traefik.enable: "true"
      traefik.http.routers.esphome.rule: Host(`esphome.${PRIVATE_DOMAIN}`)
      traefik.http.services.esphome.loadbalancer.server.port: 6052
      traefik.http.routers.esphome.entrypoints: websecure

  mosquitto:
    <<: *options
    container_name: mosquitto
    networks: [default]
    image: eclipse-mosquitto:latest
    ports:
      - 1883:1883
      - 9001:9001
    volumes:
      - "${CONFIG_DIR}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf"
      - "${CONFIG_DIR}/mosquitto/data:/mosquitto/data"
      - "${CONFIG_DIR}/mosquitto/log:/mosquitto/log"
    # broker requires auth; a CONNACK (rc 0 = ok, rc 5 = "not authorised") proves
    # it's alive — only a real connection failure (broker down) returns non-0/5.
    healthcheck:
      test:
        - CMD-SHELL
        - "mosquitto_sub -h 127.0.0.1 -p 1883 -t healthcheck -E -W 3 >/dev/null 2>&1; rc=$$?; [ $$rc -eq 0 ] || [ $$rc -eq 5 ]"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  larapaper-permissions:
    profiles: *profiles
    image: alpine:latest
    container_name: larapaper-permissions
    user: root
    command:
      - sh
      - -c
      - mkdir -p /larapaper/database /larapaper/storage && touch /larapaper/database/database.sqlite && chown -R 82:82 /larapaper
    volumes:
      - "${CONFIG_DIR}/larapaper:/larapaper"
    restart: "no"

  larapaper:
    <<: *options
    image: ghcr.io/usetrmnl/larapaper:latest
    container_name: larapaper
    environment:
      <<: *environment
      APP_KEY: "${LARAPAPER_APP_KEY:?err}"
      APP_URL: "https://trmnl.${PRIVATE_DOMAIN}"
      DB_DATABASE: database/storage/database.sqlite
      FORCE_HTTPS: "1"
      PHP_OPCACHE_ENABLE: "1"
      REGISTRATION_ENABLED: "1"
      TRMNL_PROXY_REFRESH_MINUTES: "15"
      TRUSTED_PROXIES: "*"
    volumes:
      - "${CONFIG_DIR}/larapaper/database:/var/www/html/database/storage"
      - "${CONFIG_DIR}/larapaper/storage:/var/www/html/storage/app/public/images/generated"
    # verify on host: /up is the Laravel health route; fall back to / if absent
    healthcheck:
      test: [CMD-SHELL, "curl -fsS http://localhost:8080/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.http.routers.larapaper.rule: Host(`trmnl.${PRIVATE_DOMAIN}`)
      traefik.http.routers.larapaper.entrypoints: websecure
      traefik.http.services.larapaper.loadbalancer.server.port: 8080
    depends_on:
      larapaper-permissions:
        condition: service_completed_successfully
