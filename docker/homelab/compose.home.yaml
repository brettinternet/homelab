---
x-options: &options
  profiles: &profiles [home]
  environment: &environment
    TZ: "${TIMEZONE}"
  deploy:
    restart_policy:
      condition: unless-stopped

services:
  homeassistant:
    <<: *options
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    privileged: true
    # cap_add:
    #   - CAP_NET_RAW
    #   - CAP_NET_BIND_SERVICE
    #   - CAP_NET_ADMIN
    #   - CAP_SYS_ADMIN
    environment:
      <<: *environment
      PUID: "${PUID}"
      PGID: "${PGID}"
    volumes:
      - "${CONFIG_DIR}/homeassistant:/config"
      - /var/run/dbus:/var/run/dbus
    # https://github.com/walthowd/husbzb-firmware
    devices:
      - /dev/serial/by-id/${DEVICE_ID_ZWAVE}:/dev/ttyUSB0
      - /dev/serial/by-id/${DEVICE_ID_ZIGBEE}:/dev/ttyUSB1
    labels:
      traefik.enable: "true"
      traefik.http.routers.homeassistant.rule: Host(`home.${PUBLIC_DOMAIN}`)
      traefik.http.services.homeassistant.loadbalancer.server.port: 8123
      traefik.http.routers.homeassistant.entrypoints: websecure

  esphome:
    <<: *options
    image: esphome/esphome:latest
    container_name: esphome
    environment:
      <<: *environment
      ESPHOME_DASHBOARD_USE_PING: "true"
    volumes:
      - "${CONFIG_DIR}/esphome:/config"
    network_mode: host
    # ports:
    #   - 6052:6052
    labels:
      traefik.enable: "true"
      traefik.http.routers.esphome.rule: Host(`esphome.${PRIVATE_DOMAIN}`)
      traefik.http.services.esphome.loadbalancer.server.port: 6052
      traefik.http.routers.esphome.entrypoints: websecure

  mosquitto:
    <<: *options
    container_name: mosquitto
    networks: [default]
    image: eclipse-mosquitto:latest
    ports:
      - 1883:1883
      - 9001:9001
    volumes:
      - "${CONFIG_DIR}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf"
      - "${CONFIG_DIR}/mosquitto/data:/mosquitto/data"
      - "${CONFIG_DIR}/mosquitto/log:/mosquitto/log"

  inker:
    <<: *options
    image: wojooo/inker:latest
    container_name: inker
    environment:
      <<: *environment
      ADMIN_PIN: "${TRMNL_ADMIN_PIN:-1111}"
      CORS_ORIGINS: "https://trmnl.${PRIVATE_DOMAIN}"
    volumes:
      - "${CONFIG_DIR}/inker/postgres:/var/lib/postgresql/17/main"
      - "${CONFIG_DIR}/inker/redis:/data"
      - "${CONFIG_DIR}/inker/uploads:/app/uploads"
    labels:
      traefik.enable: "true"
      traefik.http.routers.inker.rule: Host(`trmnl.${PRIVATE_DOMAIN}`)
      traefik.http.routers.inker.entrypoints: websecure
      traefik.http.services.inker.loadbalancer.server.port: 80
