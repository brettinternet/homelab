---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  ANSIBLE_DIR: "{{.ROOT_DIR}}/ansible"
  DOCKER_DIR: "{{.ROOT_DIR}}/docker"
  SCRIPTS_DIR: "{{.ROOT_DIR}}/scripts"
  AGE_DIR: ~/.config/sops/age
  AGE_FILE: "{{.AGE_DIR}}/keys.txt"
  SOPS_CONFIG_FILE: "{{.ROOT_DIR}}/.sops.yaml"
  PIP_REQUIREMENTS_FILE: "{{.ROOT_DIR}}/requirements.txt"
  PYTHON_BIN: python3

env:
  ROOT_DIR: "{{.ROOT_DIR}}"
  PYTHONDONTWRITEBYTECODE: "1"
  SOPS_AGE_KEY_FILE: "{{.AGE_FILE}}"
  VIRTUAL_ENV: "{{.ROOT_DIR}}/.venv"

includes:
  ansible:
    taskfile: .taskfiles/ansible.yaml
    dir: ./ansible
    aliases: [a]
  docker:
    taskfile: .taskfiles/docker.yaml
    dir: ./docker
    aliases: [d]
  setup: .taskfiles/setup.yaml
  sops: .taskfiles/sops.yaml

tasks:
  default:
    silent: true
    cmds:
      - task -l

  init:
    desc: Install dependencies and setup environment
    aliases: [setup]
    cmds:
      - task: setup:init
      - task: sops:init
      - task: ansible:init

  check:
    desc: Run checks
    cmds:
      - yamllint .
      - >-
        find . -type f
        \( -name '*.sh' -o -name '*.bash' -o -name '*.ksh' -o -name '*.bashrc'
        -o -name '*.bash_profile' -o -name '*.bash_login' -o -name '*.bash_logout' \)
        -not -path "./.venv/*"
        | xargs shellcheck
      - dprint check
      - prettier --check "**/*.{yaml,yml}"

  fix:
    desc: Run fixes
    cmds:
      - dprint fmt
      - prettier --write "**/*.{yaml,yml}"
