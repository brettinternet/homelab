#: schema https://mise.en.dev/schema/mise.json

[env]
_.python.venv = { path = ".venv", create = true }

[tools]
age = "latest"
bun = "latest"
direnv = "latest"
docker-cli = "latest"
docker-compose = { version = "latest", postinstall = "ln -sf $(which docker-cli-plugin-docker-compose) ~/.docker/cli-plugins/docker-compose" }
gitleaks = "latest"
lefthook = "latest"
node = "latest"
prettier = "latest"
python = "{{ get_env(name='PYTHON_VERSION', default='latest') }}"
sops = "latest"
shellcheck = "latest"
task = "latest"
uv = "latest"

[settings]
disable_backends = ["asdf", "pipx"]
pipx.uvx = true
npm.package_manager = "bun"
python.uv_venv_auto = true
experimental = true

[hooks]
enter = "mise i -q"
